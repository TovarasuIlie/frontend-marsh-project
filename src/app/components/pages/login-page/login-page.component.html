<div class="min-h-screen flex items-center justify-center bg-gray-50 dark:bg-gray-950 p-6 transition-colors duration-500">
    <div class="w-full max-w-md bg-white dark:bg-gray-900 rounded-[2.5rem] shadow-2xl border border-gray-100 dark:border-gray-800 p-10 animate-in fade-in zoom-in-95 duration-500">

        <div class="text-center mb-10">
            <div class="inline-flex h-14 w-14 items-center justify-center rounded-2xl bg-blue-600 text-white mb-6 shadow-xl shadow-blue-600/30">
                <span class="material-icons text-3xl">lock</span>
            </div>
            <h2 class="text-3xl font-black text-gray-900 dark:text-white tracking-tight">Welcome Back</h2>
            <p class="text-sm text-gray-500 dark:text-gray-400 mt-2 font-medium">Log in to manage your ApexBank assets</p>
        </div>

        <app-alert [message]="errorMessage()" [type]="'error'" (closed)="handleErrorClose()" />

        <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="space-y-6">

            <div class="space-y-1.5">
                <label class="text-[10px] font-black text-gray-400 dark:text-gray-500 uppercase tracking-[0.15em] ml-1">Email Address</label>
                <div class="relative">
                    <span class="material-icons absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 dark:text-gray-600 text-lg">alternate_email</span>
                    <input type="email" formControlName="email" placeholder="name@apexbank.com"
                        [class.border-red-500]="isInvalid('email')"
                        class="w-full pl-12 pr-4 py-4 rounded-2xl border border-gray-100 dark:border-gray-800 bg-gray-50 dark:bg-gray-950/50 text-sm font-semibold outline-none focus:border-blue-500 focus:ring-4 focus:ring-blue-500/5 transition-all dark:text-white placeholder:text-gray-400 dark:placeholder:text-gray-600">
                </div>
                @if (isInvalid('email')) {
                    <p class="text-[10px] text-red-500 mt-1 font-bold ml-1">Please enter a valid work email!</p>
                }
            </div>

            <div class="space-y-1.5">
                <label class="text-[10px] font-black text-gray-400 dark:text-gray-500 uppercase tracking-[0.15em] ml-1">Password</label>
                <div class="relative">
                    <span class="material-icons absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 dark:text-gray-600 text-lg">key</span>
                    <input [type]="showPassword() ? 'text' : 'password'" formControlName="password"
                        placeholder="••••••••" [class.border-red-500]="isInvalid('password')"
                        class="w-full pl-12 pr-12 py-4 rounded-2xl border border-gray-100 dark:border-gray-800 bg-gray-50 dark:bg-gray-950/50 text-sm font-semibold outline-none focus:border-blue-500 focus:ring-4 focus:ring-blue-500/5 transition-all dark:text-white placeholder:text-gray-400 dark:placeholder:text-gray-600">

                    <button type="button" (click)="showPassword.set(!showPassword())"
                        class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-400 hover:text-blue-600 transition-colors">
                        <span class="material-icons text-lg">{{ showPassword() ? 'visibility_off' : 'visibility' }}</span>
                    </button>
                </div>
            </div>

            <div class="flex items-center justify-between px-1">
                <label class="flex items-center gap-2 cursor-pointer group">
                    <input type="checkbox" formControlName="rememberMe"
                        class="w-4 h-4 rounded border-gray-300 dark:border-gray-700 bg-transparent text-blue-600 focus:ring-blue-500 focus:ring-offset-gray-900">
                    <span class="text-xs font-bold text-gray-500 group-hover:text-gray-700 dark:group-hover:text-gray-400 transition-colors">
                        Remember me
                    </span>
                </label>
                <a href="#" class="text-xs font-bold text-blue-600 hover:text-blue-500 transition-colors">Forgot Password?</a>
            </div>

            <button type="submit" [disabled]="loginForm.invalid"
                class="w-full bg-blue-600 hover:bg-blue-700 disabled:bg-gray-200 dark:disabled:bg-gray-800 disabled:text-gray-400 dark:disabled:text-gray-600 text-white py-4 rounded-2xl font-black text-sm shadow-xl shadow-blue-600/20 hover:shadow-blue-600/40 transform hover:-translate-y-0.5 active:translate-y-0 transition-all">
                Sign In to Portal
            </button>

            <div class="pt-4 text-center">
                <p class="text-xs font-bold text-gray-500 dark:text-gray-500">
                    New to Device Management?
                    <a routerLink="/register" class="text-blue-600 hover:text-blue-500 ml-1">Create an account</a>
                </p>
            </div>

        </form>
    </div>
</div>
