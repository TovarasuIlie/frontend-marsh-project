@if (isOpen && device) {
<div class="fixed inset-0 z-[100] flex items-center justify-center p-4 sm:p-6">
    <div class="absolute inset-0 bg-gray-900/60 backdrop-blur-sm animate-in fade-in duration-300"
        (click)="close.emit()"></div>

    <div class="relative w-full max-w-md bg-white dark:bg-[#0f1115] rounded-[2.5rem] shadow-[0_32px_64px_-12px_rgba(0,0,0,0.3)] border border-gray-100 dark:border-gray-800/50 overflow-hidden animate-in zoom-in-95 fade-in duration-300">
        
        <div class="flex flex-col items-center pt-10 pb-6 px-10 text-center">
            <div class="h-20 w-20 rounded-[2rem] bg-red-50 dark:bg-red-900/10 flex items-center justify-center text-red-600 mb-6 border border-red-100 dark:border-red-800/30">
                <span class="material-icons text-4xl animate-pulse">delete_forever</span>
            </div>
            
            <span class="text-[10px] font-black text-red-600 uppercase tracking-[0.3em] mb-2 block">Destructive Action</span>
            <h3 class="text-2xl font-black text-gray-900 dark:text-white tracking-tight">Remove Device?</h3>
            <p class="mt-3 text-sm font-medium text-gray-500 dark:text-gray-400 leading-relaxed px-4">
                You are about to permanently delete <span class="text-gray-900 dark:text-white font-bold">{{ device.name }}</span> from the ApexBank inventory.
            </p>
        </div>

        <div class="px-10 pb-4">
            <div class="flex items-center gap-4 p-4 rounded-2xl bg-gray-50 dark:bg-gray-950/50 border border-gray-100 dark:border-gray-800/50">
                <div class="h-10 w-10 rounded-xl bg-gray-200 dark:bg-gray-800 flex items-center justify-center text-gray-500">
                    <span class="material-icons text-sm">inventory_2</span>
                </div>
                <div class="text-left">
                    <p class="text-xs font-black text-gray-900 dark:text-white leading-tight uppercase tracking-tight">{{ device.manufacturer }}</p>
                    <p class="text-[10px] font-bold text-gray-500">{{ device.processor }} • {{ device.ramAmount }}GB</p>
                </div>
            </div>
        </div>

        <div class="p-10 flex flex-col gap-3">
            <button (click)="onConfirm()"
                class="w-full px-8 py-4 rounded-2xl bg-red-600 hover:bg-red-700 text-white text-xs font-black uppercase tracking-widest shadow-xl shadow-red-600/20 hover:shadow-red-600/40 transition-all duration-300 transform hover:-translate-y-1">
                Confirm Deletion
            </button>
            <button (click)="close.emit()"
                class="w-full px-8 py-4 rounded-2xl border border-gray-200 dark:border-gray-800 text-xs font-black uppercase tracking-widest text-gray-500 hover:bg-gray-50 dark:hover:bg-gray-900 transition-all duration-300">
                Cancel
            </button>
        </div>
    </div>
</div>
}
