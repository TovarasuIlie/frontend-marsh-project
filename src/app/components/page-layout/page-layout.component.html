<div class="flex h-screen overflow-hidden bg-gray-50 dark:bg-[#050505] font-sans antialiased text-gray-900 dark:text-gray-100">
    
    <app-sidebar class="z-50 shadow-2xl shadow-black/5" />

    <div class="flex flex-col flex-1 min-w-0 h-full relative">
        
        <app-navbar class="z-40" />

        <main class="flex-1 overflow-y-auto custom-scrollbar relative">
            <div class="absolute inset-0 bg-gradient-to-tr from-blue-500/5 via-transparent to-transparent pointer-events-none"></div>
            
            <div class="relative min-h-full p-10">
                <router-outlet />
            </div>
        </main>

        <app-footer />
        
        @if (!sidebarService.isCollapsed()) {
            <div (click)="sidebarService.toggle()" 
                 class="fixed inset-0 bg-black/60 backdrop-blur-md z-40 md:hidden animate-in fade-in duration-300">
            </div>
        }
    </div>
</div>

<app-toast class="z-[100]" />
