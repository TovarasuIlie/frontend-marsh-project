<header class="h-16 border-b border-gray-100 bg-white/80 px-8 backdrop-blur-md dark:border-gray-800 dark:bg-gray-950/80 flex items-center justify-between z-10">

    <div class="flex items-center gap-4">
        <div class="h-4 w-[2px] bg-blue-600 rounded-full"></div>
        <h1 class="text-[10px] font-black text-gray-400 dark:text-gray-500 tracking-[0.25em] uppercase">
            Dashboard
        </h1>
    </div>

    <div class="flex items-center gap-4">

        <button (click)="themeService.toggleTheme()"
            class="h-9 w-9 flex items-center justify-center rounded-lg text-gray-500 hover:text-blue-600 hover:bg-gray-50 transition-all dark:text-gray-400 dark:hover:bg-gray-800 active:scale-95">
            @if (themeService.darkMode()) {
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2"
                stroke="currentColor" class="w-4 h-4">
                <path stroke-linecap="round" stroke-linejoin="round"
                    d="M12 3v2.25m6.364.386-1.591 1.591M21 12h-2.25m-.386 6.364-1.591-1.591M12 18.75V21m-4.773-4.227-1.591 1.591M5.25 12H3m4.227-4.773L5.636 5.636M15.75 12a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0Z" />
            </svg>
            } @else {
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2"
                stroke="currentColor" class="w-4 h-4">
                <path stroke-linecap="round" stroke-linejoin="round"
                    d="M21.752 15.002A9.72 9.72 0 0 1 18 15.75c-5.385 0-9.75-4.365-9.75-9.75 0-1.33.266-2.597.748-3.752A9.753 9.753 0 0 0 3 11.25C3 16.635 7.365 21 12.75 21a9.753 9.753 0 0 0 9.002-5.998Z" />
            </svg>
            }
        </button>

        <div class="h-6 w-[1px] bg-gray-100 dark:bg-gray-800"></div>

        @if (loggedUser; as user) {
        <div class="flex items-center gap-3 group cursor-pointer p-1.5 pr-4 rounded-xl transition-all duration-200 hover:bg-gray-50/50 dark:hover:bg-gray-900/40">

            <div class="relative flex-shrink-0">
                <div class="h-9 w-9 rounded-lg bg-gradient-to-br from-blue-600 to-indigo-700 flex items-center justify-center text-white font-black text-xs shadow-md shadow-blue-500/10 z-10 relative overflow-hidden">
                    {{ user.name.charAt(0) }}
                    <div class="absolute inset-0 bg-white/10 group-hover:translate-x-full transition-transform duration-700 -skew-x-12"></div>
                </div>
                <div class="absolute -bottom-0.5 -right-0.5 h-3 w-3 bg-white dark:bg-gray-950 rounded-full flex items-center justify-center shadow-sm">
                    <div class="h-1.5 w-1.5 bg-emerald-500 rounded-full"></div>
                </div>
            </div>

            <div class="text-left hidden sm:flex flex-col">
                <p class="text-[12px] font-black text-gray-900 dark:text-white leading-none tracking-tight group-hover:text-blue-600 transition-colors">
                    {{ user.name }}
                </p>
                <div class="mt-1 flex items-center">
                    <div class="flex items-center gap-1.5 px-1.5 py-0.5 rounded bg-gray-50 dark:bg-gray-900 border border-transparent transition-all group-hover:border-blue-500/20"
                        [ngClass]="roleInfo().badgeClass">
                        <span class="text-[7px] font-black uppercase tracking-[0.15em]">
                            {{ roleInfo().label }}
                        </span>
                    </div>
                </div>
            </div>
            
            <span class="material-icons text-gray-300 text-[16px] group-hover:text-blue-500 transition-all ml-1">expand_more</span>
        </div>
        }
    </div>
</header>
