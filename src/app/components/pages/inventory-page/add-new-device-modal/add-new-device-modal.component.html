@if (isOpen) {
<div class="fixed inset-0 z-[100] flex items-center justify-center p-4 sm:p-6">
    <div class="absolute inset-0 bg-gray-900/60 dark:bg-black/80 backdrop-blur-md animate-in fade-in duration-300"
        (click)="closeModal()"></div>

    <div class="relative w-full max-w-2xl bg-white dark:bg-[#0f1115] rounded-2xl shadow-[0_20px_50px_rgba(0,0,0,0.3)] border border-gray-100 dark:border-gray-800/50 overflow-hidden animate-in zoom-in-95 fade-in duration-300">

        <div class="flex justify-between items-center px-8 py-6 border-b border-gray-50 dark:border-gray-900/50">
            <div>
                <span class="text-[9px] font-black text-blue-600 uppercase tracking-[0.3em] mb-1 block">Devices Inventory</span>
                <h3 class="text-xl font-black text-gray-900 dark:text-white tracking-tight">Register New Device</h3>
            </div>
            <button type="button" (click)="closeModal()"
                class="h-10 w-10 flex items-center justify-center rounded-xl bg-gray-50 dark:bg-gray-900 text-gray-400 hover:text-red-500 transition-all duration-300">
                <span class="material-icons text-lg">close</span>
            </button>
        </div>

        <div class="p-8 space-y-6">
            <form [formGroup]="deviceForm" (ngSubmit)="submit()">

                <app-alert [message]="errorMessage()" [type]="'error'" (closed)="handleErrorClose()" />

                <div class="flex items-center gap-4 p-5 rounded-xl bg-gradient-to-br from-blue-50/50 to-white dark:from-blue-900/10 dark:to-transparent border border-blue-100/30 dark:border-blue-800/20 mb-6">
                    <div class="h-14 w-14 flex-shrink-0 rounded-xl bg-blue-600 flex items-center justify-center text-white shadow-lg shadow-blue-600/20">
                        <span class="material-icons text-2xl">
                            {{ deviceForm.get('type')?.value === 1 ? 'laptop' : deviceForm.get('type')?.value === 2 ? 'desktop_windows' : 'smartphone' }}
                        </span>
                    </div>
                    <div class="flex-1 grid grid-cols-1 gap-2">
                        <input type="text" formControlName="name" placeholder="Device Model Name"
                            class="w-full px-4 py-2 bg-white dark:bg-gray-950/70 border border-gray-100 dark:border-gray-800 rounded-lg text-base font-bold dark:text-white outline-none focus:ring-4 focus:ring-blue-500/5 focus:border-blue-500 transition-all">
                        
                        <input type="text" formControlName="manufacturer" placeholder="Manufacturer (e.g. Microsoft)"
                            class="w-full px-4 py-1.5 bg-white dark:bg-gray-950/70 border border-gray-100 dark:border-gray-800 rounded-lg text-[10px] font-black text-blue-600 uppercase tracking-widest outline-none focus:border-blue-500 transition-all">
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-x-6 gap-y-5 px-1">
                    <div class="space-y-1">
                        <div class="flex items-center gap-2 text-gray-400 ml-1">
                            <span class="material-icons text-[14px]">memory</span>
                            <label class="text-[9px] font-black uppercase tracking-widest">Processor</label>
                        </div>
                        <input type="text" formControlName="processor" placeholder="Architecture" 
                            class="w-full px-4 py-2.5 bg-gray-50 dark:bg-gray-900/60 border border-gray-100/50 dark:border-gray-800/50 rounded-lg text-[13px] font-bold dark:text-gray-200 outline-none focus:border-blue-500 transition-all">
                    </div>

                    <div class="space-y-1">
                        <div class="flex items-center gap-2 text-gray-400 ml-1">
                            <span class="material-icons text-[14px]">storage</span>
                            <label class="text-[9px] font-black uppercase tracking-widest">Memory (GB)</label>
                        </div>
                        <input type="number" formControlName="ramAmount" placeholder="16" 
                            class="w-full px-4 py-2.5 bg-gray-50 dark:bg-gray-900/60 border border-gray-100/50 dark:border-gray-800/50 rounded-lg text-[13px] font-bold dark:text-gray-200 outline-none focus:border-blue-500 transition-all">
                    </div>

                    <div class="space-y-1">
                        <div class="flex items-center gap-2 text-gray-400 ml-1">
                            <span class="material-icons text-[14px]">settings_input_component</span>
                            <label class="text-[9px] font-black uppercase tracking-widest">OS Environment</label>
                        </div>
                        <input type="text" formControlName="operatingSystem" placeholder="Windows / macOS" 
                            class="w-full px-4 py-2.5 bg-gray-50 dark:bg-gray-900/60 border border-gray-100/50 dark:border-gray-800/50 rounded-lg text-[13px] font-bold dark:text-gray-200 outline-none focus:border-blue-500 transition-all">
                    </div>

                    <div class="space-y-1">
                        <div class="flex items-center gap-2 text-gray-400 ml-1">
                            <span class="material-icons text-[14px]">terminal</span>
                            <label class="text-[9px] font-black uppercase tracking-widest">Build Version</label>
                        </div>
                        <input type="text" formControlName="osVersion" placeholder="Build v1.0" 
                            class="w-full px-4 py-2.5 bg-gray-50 dark:bg-gray-900/60 border border-gray-100/50 dark:border-gray-800/50 rounded-lg text-[13px] font-bold dark:text-gray-200 outline-none focus:border-blue-500 transition-all">
                    </div>

                    <div class="space-y-1 col-span-2 mt-2">
                        <div class="flex items-center gap-2 text-gray-400 ml-1">
                            <span class="material-icons text-[14px]">category</span>
                            <label class="text-[9px] font-black uppercase tracking-widest">Asset Category</label>
                        </div>
                        <select formControlName="type" 
                            class="w-full px-4 py-2.5 bg-gray-50 dark:bg-gray-900/60 border border-gray-100/50 dark:border-gray-800/50 rounded-lg text-[13px] font-bold dark:text-gray-200 outline-none focus:border-blue-500 cursor-pointer appearance-none">
                            <option [ngValue]="1">Laptop workstation</option>
                            <option [ngValue]="2">Desktop computing</option>
                            <option [ngValue]="3">Smartphone/Tablet mobile</option>
                        </select>
                    </div>
                </div>

                <div class="relative group mt-6 pt-6 border-t border-gray-50 dark:border-gray-900">
                    <span class="text-[9px] font-black text-gray-400 uppercase tracking-widest mb-3 block ml-1">Internal Deployment Notes</span>
                    <div class="bg-gray-50/50 dark:bg-gray-900/40 p-1 rounded-xl border border-gray-100/50 dark:border-gray-800/50 focus-within:border-blue-500 transition-all">
                        <textarea formControlName="description" rows="3" placeholder="Condition, tags, or deployment notes..." 
                            class="w-full bg-transparent p-4 italic text-[13px] font-medium leading-relaxed dark:text-gray-300 outline-none resize-none"></textarea>
                    </div>
                </div>

                <div class="flex gap-4 pt-6">
                    <button type="button" (click)="closeModal()"
                        class="flex-1 px-8 py-3.5 rounded-xl border border-gray-200 dark:border-gray-800 text-[10px] font-black uppercase tracking-widest text-gray-400 hover:text-gray-900 dark:hover:text-white transition-all">
                        Discard
                    </button>
                    <button type="submit" [disabled]="deviceForm.invalid"
                        class="flex-1 px-8 py-3.5 rounded-xl bg-gray-950 dark:bg-white text-white dark:text-gray-950 text-[10px] font-black uppercase tracking-widest shadow-xl hover:opacity-90 transition-all disabled:opacity-30 disabled:transform-none">
                        Confirm Registration
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
}
