<div
    class="bg-emerald-50/40 dark:bg-emerald-900/10 border border-emerald-100/30 dark:border-emerald-800/20 rounded-2xl overflow-hidden shadow-sm">

    <div
        class="px-4 py-2.5 flex items-center justify-between bg-white/30 dark:bg-black/20 border-b border-emerald-100/50 dark:border-emerald-800/30">
        <div class="flex items-center gap-2">
            <div class="h-3.5 w-1 bg-green-500 rounded-full"></div>
            <h2 class="text-[10px] font-black text-gray-900 dark:text-white uppercase tracking-[0.3em]">System
                Filters</h2>
        </div>
        <button type="button" (click)="clearFilter()"
            class="text-[9px] font-bold text-gray-400 uppercase tracking-widest hover:text-red-500 transition-colors">
            Clear
        </button>
    </div>

    <form [formGroup]="filterForm" (ngSubmit)="applyFilter()" class="p-6">
        <div class="flex items-end gap-4">

            <div class="flex-[3] space-y-1.5">
                <div class="flex items-center gap-2 text-gray-400 ml-1">
                    <span class="material-icons text-[14px]">search</span>
                    <label class="text-[9px] font-black uppercase tracking-widest leading-none">Search devices</label>
                </div>

                <div class="relative group">
                    <input type="text" formControlName="querySearch"
                        [placeholder]="placeholderMessage"
                        class="w-full pl-4 pr-32 py-3 bg-white dark:bg-gray-950 border border-gray-100 dark:border-gray-800 rounded-xl text-[13px] font-bold dark:text-gray-200 outline-none focus:border-green-500 focus:ring-4 focus:ring-green-500/5 transition-all">

                    <button type="submit"
                        class="absolute right-1.5 top-1.5 bottom-1.5 px-5 bg-green-600 hover:bg-green-500 text-white rounded-lg font-black text-[10px] uppercase tracking-widest transition-all shadow-md shadow-green-500/20 active:scale-95 flex items-center gap-2">
                        <span class="material-icons text-sm">tune</span>
                        Apply
                    </button>
                </div>
            </div>

        </div>
    </form>
</div>
