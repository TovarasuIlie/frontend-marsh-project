@if (isOpen && employee) {
<div class="fixed inset-0 z-[100] flex items-center justify-center p-4 sm:p-6">
    <div class="absolute inset-0 bg-gray-900/60 dark:bg-black/80 backdrop-blur-md animate-in fade-in duration-500"
        (click)="close.emit()"></div>

    <div class="relative w-full max-w-md bg-white dark:bg-[#0f1115] rounded-2xl shadow-[0_20px_50px_rgba(0,0,0,0.3)] border border-gray-100 dark:border-gray-800/50 overflow-hidden animate-in zoom-in-95 fade-in duration-300">
        
        <div class="flex flex-col items-center pt-10 pb-6 px-10 text-center">
            <div class="h-16 w-16 rounded-xl bg-red-50 dark:bg-red-900/10 flex items-center justify-center text-red-600 mb-6 border border-red-100/50 dark:border-red-800/20 shadow-sm">
                <span class="material-icons text-3xl animate-pulse">person_remove</span>
            </div>
            
            <span class="text-[9px] font-black text-red-600 uppercase tracking-[0.3em] mb-2 block font-sans">Access Termination</span>
            <h3 class="text-xl font-black text-gray-900 dark:text-white tracking-tight">Revoke Personnel?</h3>
            <p class="mt-3 text-[13px] font-medium text-gray-500 dark:text-gray-400 leading-relaxed px-2">
                You are removing <span class="text-gray-900 dark:text-white font-bold">{{ employee.name }}</span> from the registry. This will revoke all active credentials.
            </p>
        </div>

        <div class="px-10 pb-4">
            <div class="flex items-center gap-4 p-3.5 rounded-xl bg-gray-50/50 dark:bg-gray-950/50 border border-gray-100 dark:border-gray-800/50">
                <div class="h-10 w-10 rounded-lg bg-white dark:bg-gray-900 flex items-center justify-center text-blue-600 border border-gray-100 dark:border-gray-800 shadow-sm font-black text-xs">
                    {{ employee.name.charAt(0) }}
                </div>
                <div class="text-left">
                    <p class="text-[10px] font-black text-gray-900 dark:text-white leading-tight uppercase tracking-wider">{{ employee.email }}</p>
                    <div class="flex items-center gap-1.5 mt-0.5">
                         <span class="material-icons text-[10px] text-gray-400">location_on</span>
                         <p class="text-[9px] font-bold text-gray-400 uppercase tracking-tighter">{{ employee.location }}</p>
                    </div>
                </div>
            </div>
        </div>

        <div class="p-10 pt-6 flex flex-col gap-3">
            <button (click)="onConfirm()"
                class="w-full px-8 py-4 rounded-xl bg-red-600 hover:bg-red-700 text-white text-[10px] font-black uppercase tracking-widest shadow-lg shadow-red-600/20 transition-all duration-300 active:scale-[0.98]">
                Confirm Termination
            </button>
            <button (click)="close.emit()"
                class="w-full px-8 py-4 rounded-xl border border-gray-200 dark:border-gray-800 text-[10px] font-black uppercase tracking-widest text-gray-400 hover:text-gray-900 dark:hover:text-white transition-all duration-300">
                Cancel
            </button>
        </div>
    </div>
</div>
}
