<div class="fixed top-5 left-1/2 -translate-x-1/2 z-[100] flex flex-col gap-3 w-full max-w-md px-4 pointer-events-none">
  @for (toast of toastService.toasts(); track toast.id) {
    <div 
      class="pointer-events-auto flex items-center gap-3 px-4 py-3 rounded-2xl shadow-xl border bg-white/80 dark:bg-gray-900/80 backdrop-blur-md transition-all duration-500 animate-toast-in"
      [class]="getClasses(toast.type)">
      
      <span class="material-icons text-xl">
        {{ toast.type === 'success' ? 'check_circle' : toast.type === 'error' ? 'error' : 'info' }}
      </span>

      <p class="text-sm font-bold tracking-tight">{{ toast.message }}</p>

      <button (click)="toastService.remove(toast.id)" class="ml-auto p-1 hover:bg-gray-100 dark:hover:bg-gray-800 rounded-lg transition-colors">
        <span class="material-icons text-sm">close</span>
      </button>
    </div>
  }
</div>
