<header class="h-16 border-b border-gray-100 bg-white/80 px-8 backdrop-blur-md dark:border-gray-800 dark:bg-gray-950/80 flex items-center justify-between z-10">

    <div class="flex items-center gap-4">
        <h1 class="text-sm font-bold text-gray-900 dark:text-white tracking-tight uppercase opacity-50">
            Dashboard
        </h1>
    </div>

    <div class="flex items-center gap-6">
        
        <button (click)="themeService.toggleTheme()"
            class="rounded-full p-2 text-gray-500 hover:bg-gray-100 transition-all dark:text-gray-400 dark:hover:bg-gray-800">
            @if (themeService.darkMode()) {
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
                stroke="currentColor" class="w-5 h-5">
                <path stroke-linecap="round" stroke-linejoin="round"
                    d="M12 3v2.25m6.364.386-1.591 1.591M21 12h-2.25m-.386 6.364-1.591-1.591M12 18.75V21m-4.773-4.227-1.591 1.591M5.25 12H3m4.227-4.773L5.636 5.636M15.75 12a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0Z" />
            </svg>
            } @else {
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
                stroke="currentColor" class="w-5 h-5">
                <path stroke-linecap="round" stroke-linejoin="round"
                    d="M21.752 15.002A9.72 9.72 0 0 1 18 15.75c-5.385 0-9.75-4.365-9.75-9.75 0-1.33.266-2.597.748-3.752A9.753 9.753 0 0 0 3 11.25C3 16.635 7.365 21 12.75 21a9.753 9.753 0 0 0 9.002-5.998Z" />
            </svg>
            }
        </button>

        <div class="h-8 w-[1px] bg-gray-100 dark:bg-gray-800"></div>

        @if (loggedUser) {
        <div class="flex items-center gap-3">
            <div class="h-8 w-8 rounded-full bg-blue-100 dark:bg-blue-900/30 flex items-center justify-center text-blue-600 dark:text-blue-400 font-bold text-xs">
                {{ loggedUser.fullname.charAt(0) }}
            </div>
            <div class="text-left hidden sm:block">
                <p class="text-xs font-bold text-gray-900 dark:text-white leading-none">{{ loggedUser.fullname }}</p>
                <p class="text-[10px] text-gray-500 font-medium mt-1">{{ loggedUser.email }}</p>
            </div>
        </div>
        }
    </div>
</header>
