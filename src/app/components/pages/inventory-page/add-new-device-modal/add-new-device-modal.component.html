@if (isOpen) {
<div class="fixed inset-0 z-[100] flex items-center justify-center p-4 sm:p-6">
    <div class="absolute inset-0 bg-gray-900/60 backdrop-blur-sm animate-in fade-in duration-300"
        (click)="closeModal()"></div>

    <div
        class="relative w-full max-w-4xl bg-white dark:bg-gray-950 rounded-3xl shadow-2xl border border-gray-100 dark:border-gray-800 overflow-hidden animate-in zoom-in-95 fade-in duration-300">

        <div class="flex justify-between items-center px-10 py-8 border-b border-gray-50 dark:border-gray-900/50">
            <div>
                <span class="text-[10px] font-black text-blue-600 uppercase tracking-[0.2em] mb-1 block">Inventory</span>
                <h3 class="text-2xl font-black text-gray-900 dark:text-white tracking-tight">Register New Device</h3>
            </div>
            <button type="button" (click)="closeModal()"
                class="h-12 w-12 flex items-center justify-center rounded-2xl bg-gray-50 dark:bg-gray-900 text-gray-400 hover:text-red-500 dark:hover:text-red-400 transition-all duration-300">
                <span class="material-icons">close</span>
            </button>
        </div>

        <div class="p-8 space-y-6">
            <form [formGroup]="deviceForm" (ngSubmit)="submit()">

                <app-alert [message]="errorMessage()" [type]="'error'" (closed)="handleErrorClose()" />

                <div
                    class="flex items-center gap-5 p-5 mb-5 rounded-[2rem] bg-gradient-to-br from-blue-50 to-white dark:from-blue-900/10 dark:to-transparent border border-blue-100/50 dark:border-blue-800/20">
                    <div
                        class="h-16 w-16 flex-shrink-0 rounded-2xl bg-blue-600 flex items-center justify-center text-white shadow-xl shadow-blue-600/30">
                        <span class="material-icons text-3xl">
                            {{ deviceForm.get('type')?.value === 1 ? 'laptop' : deviceForm.get('type')?.value === 2 ?
                            'desktop_windows' : 'smartphone' }}
                        </span>
                    </div>
                    <div class="flex-1 grid grid-cols-1 gap-1.5">
                        <input type="text" formControlName="name"
                            placeholder="Device Model Name (e.g. Surface Laptop Studio)"
                            class="w-full px-4 py-2 bg-white dark:bg-gray-950 border border-gray-100 dark:border-gray-800 rounded-xl text-lg font-black dark:text-white leading-tight outline-none focus:border-blue-500">

                        <input type="text" formControlName="manufacturer" placeholder="Manufacturer (e.g. Microsoft)"
                            class="w-full px-4 py-1.5 bg-white dark:bg-gray-950 border border-gray-100 dark:border-gray-800 rounded-xl text-xs font-bold text-blue-600 uppercase tracking-widest outline-none focus:border-blue-500">
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-x-6 gap-y-5 px-2 mb-5">

                    <div class="space-y-1.5">
                        <div class="flex items-center gap-2 text-gray-400">
                            <span class="material-icons text-sm">memory</span>
                            <label class="text-[10px] font-black uppercase tracking-widest">Processor
                                Architecture</label>
                        </div>
                        <input type="text" formControlName="processor" placeholder="Snapdragon X Elite / Intel Ultra 7"
                            class="w-full px-3 py-2 bg-gray-50 dark:bg-gray-950/50 border border-gray-100 dark:border-gray-800 rounded-lg text-sm font-bold dark:text-gray-200 outline-none focus:border-blue-500">
                    </div>

                    <div class="space-y-1.5">
                        <div class="flex items-center gap-2 text-gray-400">
                            <span class="material-icons text-sm">storage</span>
                            <label class="text-[10px] font-black uppercase tracking-widest">System Memory (GB)</label>
                        </div>
                        <input type="number" formControlName="ramAmount" placeholder="16"
                            class="w-full px-3 py-2 bg-gray-50 dark:bg-gray-950/50 border border-gray-100 dark:border-gray-800 rounded-lg text-sm font-bold dark:text-gray-200 outline-none focus:border-blue-500">
                    </div>

                    <div class="space-y-1.5">
                        <div class="flex items-center gap-2 text-gray-400">
                            <span class="material-icons text-sm">settings_input_component</span>
                            <label class="text-[10px] font-black uppercase tracking-widest">OS Environment</label>
                        </div>
                        <input type="text" formControlName="operatingSystem"
                            placeholder="Windows 11 Home / macOS Sonoma"
                            class="w-full px-3 py-2 bg-gray-50 dark:bg-gray-950/50 border border-gray-100 dark:border-gray-800 rounded-lg text-sm font-bold dark:text-gray-200 outline-none focus:border-blue-500">
                    </div>

                    <div class="space-y-1.5">
                        <div class="flex items-center gap-2 text-gray-400">
                            <span class="material-icons text-sm">terminal</span>
                            <label class="text-[10px] font-black uppercase tracking-widest">OS Build/Version</label>
                        </div>
                        <input type="text" formControlName="osVersion" placeholder="Build 22H2"
                            class="w-full px-3 py-2 bg-gray-50 dark:bg-gray-950/50 border border-gray-100 dark:border-gray-800 rounded-lg text-sm font-bold dark:text-gray-200 outline-none focus:border-blue-500">
                    </div>

                    <div class="space-y-1.5 col-span-2">
                        <div class="flex items-center gap-2 text-gray-400">
                            <span class="material-icons text-sm">category</span>
                            <label class="text-[10px] font-black uppercase tracking-widest">Asset Category</label>
                        </div>
                        <select formControlName="type"
                            class="w-full px-3 py-2 bg-gray-50 dark:bg-gray-950/50 border border-gray-100 dark:border-gray-800 rounded-lg text-sm font-bold dark:text-gray-200 outline-none focus:border-blue-500 cursor-pointer appearance-none">
                            <option [ngValue]="1" class="dark:bg-gray-950">Laptop</option>
                            <option [ngValue]="2" class="dark:bg-gray-950">Desktop</option>
                            <option [ngValue]="3" class="dark:bg-gray-950">Smartphone</option>
                        </select>
                    </div>
                </div>

                <div class="relative group">
                    <span
                        class="text-[10px] font-black text-gray-400 dark:text-gray-600 uppercase tracking-widest mb-3 block ml-2">Internal
                        Deployment Notes</span>
                    <textarea formControlName="description" rows="3"
                        placeholder="Condition: New in box. Tag: #VIP-Deployment..."
                        class="w-full bg-gray-50 dark:bg-gray-900/40 p-6 rounded-[1.5rem] border border-gray-100 dark:border-gray-800/50 italic text-sm font-medium leading-relaxed dark:text-gray-300 outline-none focus:border-blue-500 focus:ring-4 focus:ring-blue-500/5 transition-all resize-none"></textarea>
                </div>

                <div class="flex gap-4 pt-4">
                    <button type="button" (click)="closeModal()"
                        class="flex-1 px-8 py-4 rounded-2xl border border-gray-200 dark:border-gray-800 text-xs font-black tracking-widest text-gray-500 hover:bg-gray-50 dark:hover:bg-gray-900 transition-all duration-300">
                        Discard
                    </button>
                    <button type="submit" [disabled]="deviceForm.invalid"
                        class="flex-1 px-8 py-4 rounded-2xl bg-blue-600 hover:bg-blue-700 text-white text-xs font-black tracking-widest shadow-xl shadow-blue-600/20 hover:shadow-blue-600/40 transition-all duration-300 transform hover:-translate-y-1 disabled:opacity-50 disabled:shadow-none disabled:translate-y-0">
                        Confirm Registration
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
}
